name: Update Stablecoin Monitor

# Builds the public daily dashboard and publishes the docs directory to Pages.
on:
  schedule:
    # GitHub cron uses UTC. 00:00 UTC is 08:00 Beijing time.
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "config/**"
      - "scripts/**"
      - ".github/workflows/update-report.yml"

permissions:
  contents: write

concurrency:
  group: stablecoin-monitor-pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate report
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          BSKY_IDENTIFIER: ${{ secrets.BSKY_IDENTIFIER }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        run: python scripts/generate_report.py --output docs

      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "Update stablecoin monitor report"
          git push

      - name: Publish gh-pages branch
        run: |
          git subtree split --prefix docs -b gh-pages-temp
          git push origin gh-pages-temp:gh-pages --force
